<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DedeuceRL Mealy Difficulty Scaling</title>
  <desc id="desc">Grouped bar chart of Mealy benchmark success rate for GPT-5 mini and Gemini 3 Flash across 2-state, 3-state, and 4-state settings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121417"/>
      <stop offset="100%" stop-color="#1b1f24"/>
    </linearGradient>
    <linearGradient id="gptBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9f43"/>
      <stop offset="100%" stop-color="#ff6b2c"/>
    </linearGradient>
    <linearGradient id="gemBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39d98a"/>
      <stop offset="100%" stop-color="#169f6d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .title { fill: #f5f7fa; font-size: 42px; font-weight: 700; }
      .subtitle { fill: #bcc4cf; font-size: 20px; font-weight: 500; }
      .axis-label { fill: #dce2ea; font-size: 18px; font-weight: 600; }
      .tick { fill: #aeb6c2; font-size: 18px; }
      .xmain { fill: #eef2f7; font-size: 24px; font-weight: 700; }
      .xsub { fill: #97a2b2; font-size: 17px; font-weight: 500; }
      .legend { fill: #eff4fa; font-size: 20px; font-weight: 600; }
      .bar-label { fill: #ffffff; font-size: 20px; font-weight: 700; }
      .chip { fill: #20252c; stroke: #2c333c; stroke-width: 1; }
      .meta { fill: #a8b0bc; font-size: 16px; font-weight: 600; letter-spacing: 0.2px; }
      .brand { fill: #f5f7fa; font-size: 18px; font-weight: 800; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" rx="0" fill="url(#bg)"/>
  <rect x="44" y="44" width="1512" height="812" rx="8" fill="none" stroke="#2a313a" stroke-width="2"/>

  <text x="96" y="104" class="title">Mealy Difficulty Scaling</text>
  <text x="96" y="140" class="subtitle">Benchmark score shown: success rate from held-out evaluation. Mealy skin, 32 episodes per split, feedback enabled, 1 rollout.</text>

  <g transform="translate(1230 86)">
    <rect x="0" y="0" width="260" height="74" rx="8" class="chip"/>
    <rect x="24" y="22" width="18" height="18" rx="4" fill="url(#gptBar)"/>
    <text x="54" y="37" class="legend">GPT-5 mini</text>
    <rect x="24" y="47" width="18" height="18" rx="4" fill="url(#gemBar)"/>
    <text x="54" y="62" class="legend">Gemini 3 Flash</text>
  </g>

  <text x="1460" y="730" text-anchor="end" class="brand">DEDEUCERL</text>

  <g>
    <line x1="140" y1="710" x2="1460" y2="710" stroke="#9ca8b7" stroke-width="2.5"/>
    <line x1="140" y1="170" x2="140" y2="710" stroke="#9ca8b7" stroke-width="2.5"/>

    <g stroke="#2d3440" stroke-width="1.5">
      <line x1="140" y1="710" x2="1460" y2="710"/>
      <line x1="140" y1="602" x2="1460" y2="602"/>
      <line x1="140" y1="494" x2="1460" y2="494"/>
      <line x1="140" y1="386" x2="1460" y2="386"/>
      <line x1="140" y1="278" x2="1460" y2="278"/>
      <line x1="140" y1="170" x2="1460" y2="170"/>
    </g>

    <g>
      <text x="112" y="716" class="tick" text-anchor="end">0</text>
      <text x="112" y="608" class="tick" text-anchor="end">20</text>
      <text x="112" y="500" class="tick" text-anchor="end">40</text>
      <text x="112" y="392" class="tick" text-anchor="end">60</text>
      <text x="112" y="284" class="tick" text-anchor="end">80</text>
      <text x="112" y="176" class="tick" text-anchor="end">100</text>
    </g>

    <text x="48" y="440" transform="rotate(-90 48 440)" class="axis-label">Success rate (%)</text>
    <text x="800" y="812" text-anchor="middle" class="axis-label">Hidden Mealy machine size</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="252" y="288.26" width="96" height="421.74" rx="6" fill="url(#gptBar)"/>
    <rect x="372" y="473.48" width="96" height="236.52" rx="6" fill="url(#gemBar)"/>

    <rect x="692" y="558.26" width="96" height="151.74" rx="6" fill="url(#gptBar)"/>
    <rect x="812" y="693.26" width="96" height="16.74" rx="6" fill="url(#gemBar)"/>

    <rect x="1132" y="659.24" width="96" height="50.76" rx="6" fill="url(#gptBar)"/>
    <line x1="1252" y1="709" x2="1348" y2="709" stroke="#39d98a" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g>
    <g>
      <rect x="259" y="247" width="82" height="34" rx="6" class="chip"/>
      <text x="300" y="270" text-anchor="middle" class="bar-label">78.1%</text>
      <rect x="379" y="432" width="82" height="34" rx="6" class="chip"/>
      <text x="420" y="455" text-anchor="middle" class="bar-label">43.8%</text>
    </g>
    <g>
      <rect x="699" y="517" width="82" height="34" rx="6" class="chip"/>
      <text x="740" y="540" text-anchor="middle" class="bar-label">28.1%</text>
      <rect x="819" y="652" width="82" height="34" rx="6" class="chip"/>
      <text x="860" y="675" text-anchor="middle" class="bar-label">3.1%</text>
    </g>
    <g>
      <rect x="1139" y="618" width="82" height="34" rx="6" class="chip"/>
      <text x="1180" y="641" text-anchor="middle" class="bar-label">9.4%</text>
      <rect x="1260" y="662" width="92" height="34" rx="6" class="chip"/>
      <text x="1306" y="685" text-anchor="middle" class="bar-label">0.0%*</text>
    </g>
  </g>

  <g text-anchor="middle">
    <text x="360" y="758" class="xmain">2 states</text>
    <text x="360" y="786" class="xsub">budget 40</text>

    <text x="800" y="758" class="xmain">3 states</text>
    <text x="800" y="786" class="xsub">budget 40</text>

    <text x="1240" y="758" class="xmain">4 states</text>
    <text x="1240" y="786" class="xsub">budget 60</text>
  </g>

  <g transform="translate(96 834)">
    <rect x="0" y="-42" width="1408" height="58" rx="8" class="chip"/>
    <text x="24" y="-15" class="meta">Success rate is the primary benchmark score shown in DedeuceRL summaries. GPT-5 mini points come from saved JSONL runs on s2, s3, and s4.</text>
    <text x="24" y="7" class="meta">Gemini 3 Flash uses saved runs on s2 and s3, with the 4-state point shown as 0.0% by local benchmark note.</text>
  </g>
</svg>
